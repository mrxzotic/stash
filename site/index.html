<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tuckio</title>
    <meta
      name="description"
      content="Tuckio saves products from any shop into a compact local browser library."
    >
    <link rel="icon" href="/assets/tuckio-icon-128.png">
    <link rel="apple-touch-icon" href="/assets/tuckio-icon-128.png">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="teaser" aria-labelledby="hero-title">
      <header class="topbar" aria-label="Site navigation">
        <a class="wordmark" href="/" aria-label="Tuckio home">Tuckio</a>
        <nav class="nav">
          <a href="/privacy">Privacy</a>
        </nav>
      </header>

      <section class="hero" aria-label="Tuckio teaser">
        <div class="product-stage" aria-hidden="true">
          <img class="hero-logo" src="/assets/tuckio-app.png" alt="">
        </div>
        <div class="hero-copy">
          <h1 id="hero-title">Tuckio</h1>
          <h2 class="hero-line">Your private product library.</h2>
          <p class="lede">
            Save product images, prices, brands, and source links locally in your browser.
          </p>
          <a class="store-link" href="https://chromewebstore.google.com/detail/akehcgpjghmmenhicldnppjjelkipfpk?utm_source=item-share-cb" target="_blank" rel="noopener noreferrer">Try it now</a>
          <div class="browser-strip" aria-label="Supported browsers">
            <span>Built for</span>
            <span class="browser">
              <img src="/assets/browser-chrome.svg" alt="" aria-hidden="true">Chrome
            </span>
            <span class="browser">
              <img src="/assets/browser-edge.svg" alt="" aria-hidden="true">Edge
            </span>
            <span class="browser">
              <img src="/assets/browser-brave.svg" alt="" aria-hidden="true">Brave
            </span>
          </div>
        </div>
      </section>

      <section class="detail" aria-label="Launch status">
        <p><strong>Local-first</strong></p>
        <p><strong>No account</strong></p>
        <p><strong>No background scraping</strong></p>
      </section>
    </main>
  </body>
</html>
