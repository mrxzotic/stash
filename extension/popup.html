<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Wishlisted</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1>Saved</h1>
          <p id="count">0 items</p>
        </div>
        <div class="top-actions">
          <div id="total" class="total">0 saved</div>
          <button id="settings-toggle" class="icon-button settings-button" type="button" aria-label="Settings" aria-expanded="false">
            <span aria-hidden="true"></span>
          </button>
          <button id="close-popup" class="icon-button close-button" type="button" aria-label="Close"></button>
        </div>
      </header>

      <section id="settings-panel" class="settings-panel" hidden>
        <div class="settings-head">
          <div>
            <h2>Categories</h2>
            <p>Used in filters and right-click save.</p>
          </div>
          <button id="reset-categories" class="text-button" type="button">Reset</button>
        </div>
        <div id="category-list" class="category-list"></div>
        <form id="category-form" class="category-form">
          <input id="category-input" type="text" placeholder="New category" maxlength="28" autocomplete="off">
          <button type="submit">Add</button>
        </form>
      </section>

      <label class="search">
        <span>Search</span>
        <input id="search" type="search" placeholder="Search saved" autocomplete="off">
      </label>

      <nav id="filters" class="filters" aria-label="Wishlist categories"></nav>

      <section id="items" class="items" aria-live="polite"></section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
